<div class="space-y-8">
  <h1 class="text-2xl font-semibold text-gray-800">Análisis de tráfico</h1>

  <!-- Gráfico circular -->
  <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100 flex flex-col items-center">
    <h2 class="text-lg font-semibold mb-4 text-gray-700">Fuentes de tráfico</h2>
    <div class="relative w-48 h-48">
      <svg viewBox="0 0 36 36" class="w-full h-full">
        <path class="text-blue-500" fill="none" stroke-width="3.8"
          stroke-dasharray="70, 100" d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"/>
        <path class="text-green-400" fill="none" stroke-width="3.8"
          stroke-dasharray="20, 100" stroke-dashoffset="-70"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"/>
        <path class="text-yellow-400" fill="none" stroke-width="3.8"
          stroke-dasharray="10, 100" stroke-dashoffset="-90"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"/>
      </svg>
      <div class="absolute inset-0 flex items-center justify-center">
        <span class="text-xl font-semibold">100%</span>
      </div>
    </div>
  </div>

  <!-- Tabla -->
  <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
    <h2 class="text-lg font-semibold mb-4 text-gray-700">Sesiones recientes</h2>
    <table class="w-full text-left border-collapse">
      <thead>
        <tr class="text-gray-500 border-b">
          <th class="py-2 px-3">Usuario</th>
          <th class="py-2 px-3">País</th>
          <th class="py-2 px-3">Duración</th>
          <th class="py-2 px-3">Dispositivo</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let user of [1,2,3,4]" class="border-b hover:bg-gray-50">
          <td class="py-2 px-3">Usuario {{ user }}</td>
          <td class="py-2 px-3">Colombia</td>
          <td class="py-2 px-3">5m {{ user * 3 }}s</td>
          <td class="py-2 px-3">Desktop</td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
