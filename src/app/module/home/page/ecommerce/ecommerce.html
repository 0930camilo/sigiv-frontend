<div class="space-y-8">
  <h1 class="text-2xl font-semibold text-gray-800">Panel eCommerce</h1>

  <!-- Resumen -->
  <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
    <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
      <p class="text-gray-500">Ventas hoy</p>
      <h2 class="text-2xl font-bold text-green-600 mt-1">$1,245</h2>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
      <p class="text-gray-500">Pedidos</p>
      <h2 class="text-2xl font-bold text-blue-600 mt-1">58</h2>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
      <p class="text-gray-500">Clientes nuevos</p>
      <h2 class="text-2xl font-bold text-purple-600 mt-1">23</h2>
    </div>
    <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
      <p class="text-gray-500">Stock bajo</p>
      <h2 class="text-2xl font-bold text-red-600 mt-1">4</h2>
    </div>
  </div>

  <!-- Lista de productos -->
  <div class="bg-white p-6 rounded-2xl shadow-md border border-gray-100">
    <h2 class="text-lg font-semibold mb-4 text-gray-700">Productos destacados</h2>
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
      <div *ngFor="let p of [1,2,3]" class="border rounded-xl overflow-hidden shadow hover:shadow-lg transition">
        <img src="https://placehold.co/600x400" class="w-full h-40 object-cover">
        <div class="p-4">
          <h3 class="font-semibold text-gray-800">Producto {{ p }}</h3>
          <p class="text-sm text-gray-500 mt-1">Categoría {{ p }}</p>
          <div class="flex justify-between items-center mt-3">
            <span class="font-bold text-blue-600">$ {{ 20 * p }}.00</span>
            <button class="bg-blue-600 text-white px-3 py-1 rounded-lg hover:bg-blue-700">Ver</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
