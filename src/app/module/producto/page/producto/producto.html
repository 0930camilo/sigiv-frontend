<div class="p-4 sm:p-6">

  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-800">
      Productos de la Empresa
    </h2>

    <div class="flex items-center gap-3">
      <app-register-producto
        (productoCreado)="onProductoCreado($event)">
      </app-register-producto>

      <input
        #importInput
        type="file"
        accept=".xlsx,.xls"
        class="hidden"
        (change)="onArchivoSeleccionado($event)" />

      <button
        type="button"
        (click)="downloadPlantilla()"
        class="px-4 py-2 text-sm font-medium text-white bg-emerald-600 hover:bg-emerald-700 rounded-lg shadow disabled:opacity-50 disabled:cursor-not-allowed"
        [disabled]="!empresaId || downloadingPlantilla">
        {{ downloadingPlantilla ? 'Descargando...' : 'Descargar plantilla' }}
      </button>

      <button
        type="button"
        (click)="abrirSelectorArchivo(importInput)"
        class="px-4 py-2 text-sm font-medium text-white bg-green-600 hover:bg-green-700 rounded-lg shadow"
        [disabled]="importando">
        {{ importando ? 'Importando...' : 'Importar Excel' }}
      </button>
    </div>
  </div>

  <app-filtros-producto
    *ngIf="empresaId"
    [empresaId]="empresaId"
    (filtrarNombre)="filtrarPorNombre($event)"
    (filtrarCodigoBarra)="filtrarPorCodigoBarra($event)"
    (filtrarEstado)="filtrarPorEstado($event)"
    (filtrarCategoria)="filtrarPorCategoria($event)"
    (filtrarProveedor)="filtrarPorProveedor($event)">
  </app-filtros-producto>

  <app-reusable-table
    [data]="productos"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="nextPage()"
    (previous)="previousPage()"
    (actionClick)="onAction($event)">
  </app-reusable-table>

  <app-edit-producto
    *ngIf="productoSeleccionado"
    [producto]="productoSeleccionado"
    (productoActualizado)="onProductoActualizado($event)"
    (cerrar)="productoSeleccionado = null">
  </app-edit-producto>

  <app-delete-producto
    *ngIf="productoAEliminar"
    [producto]="productoAEliminar"
    (eliminado)="onProductoEliminado($event)"
    (cerrar)="productoAEliminar = null">
  </app-delete-producto>

</div>
