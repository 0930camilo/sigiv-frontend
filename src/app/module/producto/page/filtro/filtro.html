<div class="flex gap-4 mb-4 flex-wrap">

  <!-- BUSCAR POR NOMBRE -->
  <input
    type="text"
    placeholder="Buscar por nombre..."
    class="border rounded px-3 py-2 w-60"
    [(ngModel)]="filtroNombre"
    (input)="buscarPorNombre()"
  />

  <!-- ESTADO -->
  <select
    class="border rounded px-3 py-2"
    [(ngModel)]="filtroEstado"
    (change)="filtrarPorEstado()"
  >
    <option value="">Filtrar por estado</option>
    <option value="Activo">Activo</option>
    <option value="Inactivo">Inactivo</option>
  </select>

  <!-- CATEGORÍA (ENVÍA NOMBRE) -->
  <select
    class="border rounded px-3 py-2"
    [(ngModel)]="categoriaNombre"
    (change)="filtrarPorCategoria()"
  >
    <option value="">Categoría</option>
    <option *ngFor="let c of categorias" [ngValue]="c.nombre">
      {{ c.nombre }}
    </option>
  </select>

  <!-- PROVEEDOR (ENVÍA NOMBRE) -->
  <select
    class="border rounded px-3 py-2"
    [(ngModel)]="proveedorNombre"
    (change)="filtrarPorProveedor()"
  >
    <option value="">Proveedor</option>
    <option *ngFor="let p of proveedores" [ngValue]="p.nombre">
      {{ p.nombre }}
    </option>
  </select>

</div>
