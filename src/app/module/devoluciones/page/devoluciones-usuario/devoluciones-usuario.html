<div class="p-4 sm:p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">Mis Devoluciones</h2>
  </div>

  <div class="bg-white rounded-lg shadow p-4 mb-4">
    <div class="flex flex-wrap items-end gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Filtrar por ID de Venta</label>
        <input
          type="number"
          [(ngModel)]="ventaIdBuscar"
          placeholder="Ej: 1"
          class="border rounded px-3 py-2 text-sm w-48"
          (keyup.enter)="buscar()" />
      </div>
      <button
        (click)="buscar()"
        class="bg-blue-600 text-white px-4 py-2 rounded text-sm hover:bg-blue-700 transition">
        Buscar
      </button>
      <button
        (click)="limpiar()"
        class="bg-gray-300 text-gray-700 px-4 py-2 rounded text-sm hover:bg-gray-400 transition">
        Limpiar
      </button>
    </div>
  </div>

  <app-reusable-table
    [data]="devoluciones"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="cargarDevoluciones(currentPage + 1)"
    (previous)="cargarDevoluciones(currentPage - 1)">
  </app-reusable-table>

  <div *ngIf="!loading && ventaBuscada && devoluciones.length === 0" class="text-center text-gray-500 py-6">
    No se encontraron devoluciones.
  </div>
</div>
