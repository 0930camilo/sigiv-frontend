<div class="p-4 sm:p-6">

  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">🔄 Devoluciones</h2>
  </div>

  <div class="bg-white rounded-lg shadow p-4 mb-4">

    <div class="filtro-devoluciones">

      <label class="block text-sm font-medium text-gray-700 mb-2">
        Filtrar por ID de Venta
      </label>

      <div class="fila-filtro">

        <input
          type="number"
          [(ngModel)]="ventaIdBuscar"
          placeholder="Ej: 1"
          class="input-filtro"
          (keyup.enter)="buscar()">

        <button
          type="button"
          (click)="buscar()"
          class="btn-buscar"
          title="Buscar">
          🔍
        </button>

        <button
          type="button"
          (click)="limpiar()"
          class="btn-limpiar"
          title="Limpiar">
          🧹
        </button>

      </div>

    </div>

    <app-reusable-table
      [data]="devoluciones"
      [columns]="columns"
      [loading]="loading"
      [currentPage]="currentPage"
      [totalPages]="totalPages"
      (next)="cargarDevoluciones(currentPage + 1)"
      (previous)="cargarDevoluciones(currentPage - 1)">
    </app-reusable-table>

    <div
      *ngIf="!loading && ventaBuscada && devoluciones.length === 0"
      class="text-center text-gray-500 py-6">

      No se encontraron devoluciones.

    </div>

  </div>

</div>
