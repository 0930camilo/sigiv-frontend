<div class="min-h-screen flex items-center justify-center bg-black px-4 py-8">
  <div class="w-full max-w-2xl">
    <div class="bg-zinc-900 rounded-2xl p-8 border border-zinc-800">
      <h2 class="text-3xl font-bold text-white text-center mb-2">
        Registrar Empresa
      </h2>
      <p class="text-gray-400 text-center mb-8">
        Tu cuenta quedara pendiente hasta que un administrador la active.
      </p>

      <div *ngIf="successMessage" class="mb-4 p-3 bg-emerald-500/10 border border-emerald-500/50 rounded-lg">
        <p class="text-emerald-400 text-sm text-center">{{ successMessage }}</p>
      </div>

      <div *ngIf="errorMessage" class="mb-4 p-3 bg-red-500/10 border border-red-500/50 rounded-lg">
        <p class="text-red-400 text-sm text-center">{{ errorMessage }}</p>
      </div>

      <form [formGroup]="empresaForm" (ngSubmit)="registrarEmpresa()" class="grid grid-cols-1 md:grid-cols-2 gap-4">
        <div>
          <label class="block text-white text-sm font-medium mb-2">Nombre empresa</label>
          <input formControlName="nombre_empresa" type="text" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2">NIT</label>
          <input formControlName="nit" type="text" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2">Correo</label>
          <input formControlName="correo" type="email" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div>
          <label class="block text-white text-sm font-medium mb-2">Telefono</label>
          <input formControlName="telefono" type="text" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-white text-sm font-medium mb-2">Direccion</label>
          <input formControlName="direccion" type="text" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div class="md:col-span-2">
          <label class="block text-white text-sm font-medium mb-2">Clave</label>
          <input formControlName="clave" type="password" class="w-full bg-zinc-800 text-white rounded-lg px-4 py-3 border border-zinc-700 focus:outline-none focus:border-emerald-500" />
        </div>

        <div class="md:col-span-2 mt-2">
          <button
            type="submit"
            [disabled]="loading || empresaForm.invalid"
            class="w-full bg-emerald-500 hover:bg-emerald-600 disabled:bg-emerald-500/50 disabled:cursor-not-allowed text-white font-semibold py-3 rounded-lg transition"
          >
            {{ loading ? 'Registrando...' : 'Registrar Empresa' }}
          </button>
        </div>
      </form>

      <div class="mt-6 text-center">
        <a routerLink="/login" class="text-emerald-400 hover:underline font-semibold">Ya tengo cuenta</a>
      </div>
    </div>
  </div>
</div>
