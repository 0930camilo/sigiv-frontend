<div class="p-3 md:p-6">

  <!-- Encabezado -->
  <div class="flex items-center justify-between mb-3 md:mb-4 encabezado">

    <h2 class="text-lg md:text-2xl font-semibold text-gray-800 dark:text-gray-100 titulo">
      Proveedores
    </h2>

    <app-register-proveedor
      [empresaId]="empresaId"
      (proveedorCreado)="onProveedorCreado($event)">
    </app-register-proveedor>

  </div>



  <!-- Filtros -->
  <app-filtros-proveedor
    (filtrarNombre)="filtrarPorNombre($event)"
    (filtrarDocumento)="filtrarPorDocumento($event)"
    (filtrarEstado)="filtrarPorEstado($event)">
  </app-filtros-proveedor>

  <!-- Tabla -->
  <app-reusable-table
    [data]="proveedores"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="getProveedores(currentPage + 1)"
    (previous)="getProveedores(currentPage - 1)"
    (actionClick)="onAction($event)">
  </app-reusable-table>

  <!-- Modal Editar -->
  <app-edit-proveedor
    *ngIf="proveedorSeleccionado"
    [proveedor]="proveedorSeleccionado"
    (proveedorActualizado)="onProveedorActualizado($event)"
    (cerrar)="proveedorSeleccionado = null">
  </app-edit-proveedor>

  <!-- Modal Eliminar -->
  <app-delete-proveedor
    *ngIf="proveedorAEliminar"
    [proveedor]="proveedorAEliminar"
    (eliminado)="onProveedorEliminado($event)"
    (cerrar)="proveedorAEliminar = null">
  </app-delete-proveedor>

</div>
