<!-- Botón abrir modal -->
<button
  (click)="abrirModal()"
  class="px-4 py-2 text-sm font-medium text-white bg-blue-600 hover:bg-blue-700 rounded-lg shadow">
  Crear Proveedor
</button>

<!-- Modal -->
<div *ngIf="mostrarModal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">
  <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-lg w-full max-w-md p-6 relative">
    <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-100 mb-4">
      Crear nuevo proveedor
    </h3>

    <form [formGroup]="formProveedor" (ngSubmit)="crearProveedor()">
      <div class="space-y-4">
        <input formControlName="documento" type="text" placeholder="Documento"
          class="w-full border rounded-lg px-3 py-2" />

        <input formControlName="nombre" type="text" placeholder="Nombre del proveedor"
          class="w-full border rounded-lg px-3 py-2" />

        <input formControlName="telefono" type="number" placeholder="Teléfono"
          class="w-full border rounded-lg px-3 py-2" />

        <input formControlName="direccion" type="text" placeholder="Dirección"
          class="w-full border rounded-lg px-3 py-2" />

        <select formControlName="estado" class="w-full border rounded-lg px-3 py-2">
          <option value="">Seleccione estado</option>
          <option value="Activo">Activo</option>
          <option value="Inactivo">Inactivo</option>
        </select>
      </div>

      <div class="mt-6 flex justify-end gap-3">
        <button type="button" (click)="cerrarModal()"
          class="px-4 py-2 bg-gray-300 dark:bg-gray-600 rounded-lg hover:bg-gray-400 dark:hover:bg-gray-500">
          Cancelar
        </button>
        <button type="submit" [disabled]="formProveedor.invalid || creandoProveedor"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:opacity-50">
          {{ creandoProveedor ? 'Creando...' : 'Guardar' }}
        </button>
      </div>
    </form>

    <button (click)="cerrarModal()" class="absolute top-3 right-3 text-gray-400 hover:text-gray-600">
      ✕
    </button>
  </div>
</div>
