<div class="p-4 sm:p-6">

  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold">
      🛒 Ventas de la Empresa
    </h2>
  </div>

  <app-filtros-ventas
    (filtrarId)="filtrarPorId($event)">
  </app-filtros-ventas>

  <app-reusable-table
    [data]="ventas"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="getVentas(currentPage + 1)"
    (previous)="getVentas(currentPage - 1)">
  </app-reusable-table>

</div>

<!-- MODAL DETALLE -->
<div
  *ngIf="mostrarDetalle && ventaSeleccionada"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  role="dialog"
  aria-modal="true">

  <div class="bg-white dark:bg-gray-800 p-6 rounded-lg w-full max-w-3xl">

    <div class="flex justify-between items-center mb-4">
      <h3 class="text-lg font-semibold">
        🧾 Detalle Venta #{{ ventaSeleccionada.idventa }}
      </h3>
      <button
        type="button"
        class="text-red-600 text-xl"
        aria-label="Cerrar"
        (click)="mostrarDetalle = false">
        ✖
      </button>
    </div>

    <table class="w-full border text-sm">
      <thead class="bg-gray-100 dark:bg-gray-700">
        <tr>
          <th class="p-2 text-left">Producto</th>
          <th class="p-2 text-center">Cantidad</th>
          <th class="p-2 text-center">Precio</th>
          <th class="p-2 text-center">Subtotal</th>
        </tr>
      </thead>

      <tbody *ngIf="ventaSeleccionada.detalles?.length; else sinDetalles">
        <tr *ngFor="let d of ventaSeleccionada.detalles">
          <td class="p-2">{{ d.descripcionProducto }}</td>
          <td class="p-2 text-center">{{ d.cantidad }}</td>
          <td class="p-2 text-center">
            {{ d.precio | number:'1.0-0':'es-CO' }}
          </td>
          <td class="p-2 text-center">
            {{ d.subtotal | number:'1.0-0':'es-CO' }}
          </td>
        </tr>
      </tbody>
    </table>

    <ng-template #sinDetalles>
      <div class="p-4 text-center text-gray-500">
        No hay productos en esta venta
      </div>
    </ng-template>

    <div class="flex justify-end mt-4">
      <button
        type="button"
        class="px-4 py-2 bg-blue-600 text-white rounded"
        (click)="mostrarDetalle = false">
        Cerrar
      </button>
    </div>

  </div>
</div>

<!-- MODAL PREVIEW FACTURA -->
<div
  *ngIf="mostrarPreviewFactura && facturaPreviewUrl"
  class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50"
  role="dialog"
  aria-modal="true">

  <div class="bg-white dark:bg-gray-800 p-4 rounded-lg w-full max-w-4xl h-[85vh] flex flex-col">

    <div class="flex justify-between items-center mb-3">
      <h3 class="text-lg font-semibold">
        📄 Factura #{{ facturaIdActual }}
      </h3>
      <button
        type="button"
        class="text-red-600 text-xl"
        aria-label="Cerrar"
        (click)="cerrarPreviewFactura()">
        ✖
      </button>
    </div>

    <div class="flex-1 min-h-0">
      <iframe
        [src]="facturaPreviewUrl"
        class="w-full h-full rounded border"
        type="application/pdf">
      </iframe>
    </div>

    <div class="flex justify-end gap-3 mt-3">
      <button
        type="button"
        class="px-4 py-2 bg-gray-300 dark:bg-gray-600 text-gray-800 dark:text-white rounded hover:bg-gray-400"
        (click)="cerrarPreviewFactura()">
        Cerrar
      </button>
      <button
        type="button"
        class="px-4 py-2 bg-purple-600 text-white rounded hover:bg-purple-700 flex items-center gap-2"
        (click)="imprimirFacturaPos()">
        <i class="fa-solid fa-print"></i> Imprimir POS
      </button>
      <button
        type="button"
        class="px-4 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 flex items-center gap-2"
        (click)="descargarFacturaDesdePreview()">
        <i class="fa-solid fa-download"></i> Descargar
      </button>
    </div>

  </div>
</div>
