<div class="p-4 sm:p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Usuarios de la Empresa</h2>
    <app-register [empresaId]="empresaId" (usuarioCreado)="getUsuarios()"></app-register>
  </div>

  <app-filtros-usuario
    (filtrarNombre)="onFiltrarNombre($event)"
    (filtrarEstado)="onFiltrarEstado($event)">
  </app-filtros-usuario>

  <app-reusable-table
    [data]="usuarios"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="getUsuarios(currentPage + 1)"
    (previous)="getUsuarios(currentPage - 1)"
    (actionClick)="onAction($event)">
  </app-reusable-table>

  @if (mostrarEditar && usuarioSeleccionado) {
    <app-edit-usuario
      [usuario]="usuarioSeleccionado"
      (usuarioActualizado)="onUsuarioActualizado()"
      (cerrar)="mostrarEditar = false">
    </app-edit-usuario>
  }

  @if (mostrarEliminar && usuarioSeleccionado) {
    <app-delete-user
      [usuario]="usuarioSeleccionado"
      (eliminado)="onUsuarioEliminado()"
      (cerrar)="mostrarEliminar = false">
    </app-delete-user>
  }
</div>
