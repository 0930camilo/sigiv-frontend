<div class="p-4 sm:p-6">
  <div class="flex items-center justify-between mb-4">
    <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">
      Categorías
    </h2>

    <app-register-categoria
      [empresaId]="empresaId"
      (categoriaCreada)="onCategoriaCreada($event)">
    </app-register-categoria>
  </div>


 <!-- FILTROS -->
  <app-filtros-categoria
    (filtrarNombre)="filtrarPorNombre($event)"
    (filtrarEstado)="filtrarPorEstado($event)">
  </app-filtros-categoria>


  <app-reusable-table
    [data]="categorias"
    [columns]="columns"
    [loading]="loading"
    [currentPage]="currentPage"
    [totalPages]="totalPages"
    (next)="getCategorias(currentPage + 1)"
    (previous)="getCategorias(currentPage - 1)"
    (actionClick)="onAction($event)">
  </app-reusable-table>

  <!-- MODAL EDITAR -->
  <app-edit-categoria
    *ngIf="categoriaSeleccionada"
    [categoria]="categoriaSeleccionada"
    (categoriaActualizada)="onCategoriaActualizada($event)"
    (cerrar)="categoriaSeleccionada = null">
  </app-edit-categoria>

<app-eliminar-categoria
  *ngIf="categoriaAEliminar"
  [categoria]="categoriaAEliminar"
  (eliminado)="onCategoriaEliminada($event)"
  (cerrar)="categoriaAEliminar = null">
</app-eliminar-categoria>

</div>
