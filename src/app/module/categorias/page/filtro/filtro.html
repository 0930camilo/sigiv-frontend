<div class="flex gap-4 mb-4 flex-wrap filtros">
  <input
    type="text"
    placeholder="Nombre..."
    class="border rounded px-3 py-2 w-60 filtro-input"
    [(ngModel)]="filtroNombre"
    (input)="buscarPorNombre()"
  />

  <select
    class="border rounded px-3 py-2 estado"
    [(ngModel)]="filtroEstado"
    (change)="filtrarPorEstado()"
  >
    <option value="">Estado</option>
    <option value="Activo">Activo</option>
    <option value="Inactivo">Inactivo</option>
  </select>

</div>
